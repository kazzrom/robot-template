_subdirectory: template

include_it_enterprise:
    type: bool
    help: "Включить файлы для работы с IT-Enterprise?"
    default: true

install_playwright:
    type: bool
    help: "Установить Playwright (Browser Library)?"
    default: "{{ include_it_enterprise }}"
    when: "{{ not include_it_enterprise }}"

use_dev_containers:
    type: bool
    help: "Использовать Dev Containers?"
    default: false

_tasks:
    - ["python", "{{ _copier_conf.src_path }}/scripts/post_gen.py", "--playwright", "{{ install_playwright }}", "--dev_containers", "{{ use_dev_containers }}"]

_exclude:
    - "{% if not include_it_enterprise %}resources/it_enterprise.resource{% endif %}"
    - "{% if not include_it_enterprise %}variables/it_enterprise.py{% endif %}"
    - "{% if not include_it_enterprise %}locators/it_enterprise.py{% endif %}"
    - "{% if not include_it_enterprise %}resources/table.resource{% endif %}"
    - "{% if not include_it_enterprise %}locators/table.py{% endif %}"
    - "{% if not use_dev_containers %}.devcontainer{% endif %}"
